<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tracker</title>
    <!--    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>-->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .hidden {
            display: none !important;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 2rem;
            max-width: 800px;
        }

        .book-card {
            border: 1px solid #ccc;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 300px;
        }
    </style>
</head>
<body>

<!-- PUBLIC VIEW CONTAINER -->
<div id="public-view">
    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1>My Personal Library</h1>
        <a href="#admin" id="admin-nav-btn">Admin Portal</a>
    </header>
    <hr>
    <div id="books-list">Loading books...</div>
</div>

<!-- HIDDEN ADMIN VIEW CONTAINER -->
<div id="admin-view" class="hidden">
    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Admin Panel</h1>
        <a href="#">← Back to Library</a>
    </header>
    <hr>

    <!-- Step A: Shown if NOT logged in -->
    <div id="login-section">
        <h3>Admin Login</h3>
        <form id="login-form">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Email" required>
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <!-- Step B: Shown ONLY if successfully logged in -->
    <div id="dashboard-section" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <p>Welcome back, Authenticated User!</p>
            <button id="logout-btn">Log Out</button>
        </div>

        <h3>Add a New Book</h3>
        <form id="add-book-form">
            <label for="title">Book Title</label>
            <input type="text" id="title" placeholder="Book Title" required>
            <label for="description">Description</label>
            <textarea id="description" placeholder="Description"></textarea>
            <label for="authors">Authors (comma separated)</label>
            <input type="text" id="authors" placeholder="Authors (comma separated)" required>
            <label for="tropes">Tropes (comma separated)</label>
            <input type="text" id="tropes" placeholder="Tropes (comma separated)">
            <button type="submit">Save Book to Library</button>
        </form>
    </div>
</div>

<script src="../scripts/admin.js"></script>
</body>
</html>
