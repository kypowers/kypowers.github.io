<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Book Tracker</title>
    <link rel="stylesheet" href="../css/global.css">
    <!--    <link rel="stylesheet" href="../css/dashboard.css">-->
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div id="sidebar-container"></div>
<script src="../scripts/components.js"></script>

<div class="main-content">

    <div id="login-section">
        <h3>Admin Login</h3>
        <form id="login-form">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Email" required>
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <!-- Step B: Shown ONLY if successfully logged in -->
    <div id="dashboard-section" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <h2>Welcome back!</h2>
            <button id="logout-btn">Log Out</button>
        </div>

        <h3>Add a New Book</h3>
        <form id="add-book-form">
            <label for="title">Book Title</label>
            <input type="text" id="title" placeholder="Book Title" required>
            <label for="description">Description</label>
            <textarea id="description" placeholder="Description"></textarea>
            <label for="authors">Authors (comma separated)</label>
            <input type="text" id="authors" placeholder="Authors (comma separated)" required>
            <label for="tropes">Tropes (comma separated)</label>
            <input type="text" id="tropes" placeholder="Tropes (comma separated)">
            <button type="submit">Save Book to Library</button>
        </form>
    </div>
</div>
<script type="module" src="../scripts/admin.js"></script>

</body>
</html>
