<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<!-- Left Sidebar Menu Section -->
<div class="sidebar">
    <h2>Book Manager</h2>
    <ul>
        <li><a href="../index.html">Dashboard Home</a></li>
        <li><a href="./books.html">Books</a></li>
        <li><a href="./search.html">Search</a></li>
    </ul>
</div>

<!-- Right Workspace Tracking Window -->
<div class="main-content">
    <div class="header">
        <h1>All Books</h1>
    </div>

    <!-- Books List -->
    <div id="book-list" class="books-grid"></div>

    <!-- Pagination Controls -->
    <div class="pagination-controls">
        <button id="prev-btn" class="pagination-btn">← Previous</button>
        <span id="page-info" class="page-info">Page 1</span>
        <button id="next-btn" class="pagination-btn">Next →</button>
    </div>
</div>

<!-- Book Detail Modal -->
<div id="book-modal" class="modal">
    <div class="modal-content">
        <button id="modal-close" class="modal-close">&times;</button>
        <div id="modal-body" class="modal-body">
            <!-- Book details will be populated here -->
        </div>
    </div>
</div>

<script type="module" src="../scripts/books.js"></script>
</body>
</html>
