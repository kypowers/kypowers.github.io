<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Books</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<!-- Left Sidebar Menu Section -->
<!-- Left Sidebar Menu Section -->
<div id="sidebar-container"></div>
<script src="../scripts/components.js"></script>

<!-- Right Workspace Tracking Window -->
<div class="main-content">
    <div class="header">
        <h1>Search Books</h1>

        <section class="panel" id="bookPanel" style="display:none">
            <div class="flex-between">
                <h2 style="margin:0">Search</h2>
                <div class="controls">
                    <button id="refreshBtn" title="Reload list">Clear</button>
                </div>
            </div>

            <div id="booksContainer" style="margin-top:12px">
                <ul class="book-list" id="bookList"></ul>
            </div>

            <hr style="margin:16px 0"/>

            <form id="bookForm">
                <label for="title">Title</label>
                <input id="title" name="title" type="text" required/>

                <div class="row">
                    <div>
                        <label for="series">Series</label>
                        <select id="series"></select>
                    </div>
                    <div>
                        <label for="category">Category</label>
                        <select id="category"></select>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label for="rating">Rating (1-5)</label>
                        <select id="rating">
                            <option value="">вҖ”</option>
                            <option>вӯҗпёҸ</option>
                            <option>вӯҗпёҸвӯҗпёҸ</option>
                            <option>вӯҗпёҸвӯҗпёҸвӯҗпёҸ</option>
                            <option>вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ</option>
                            <option>вӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸвӯҗпёҸ</option>
                        </select>
                    </div>
                    <div>
                        <label for="spice">Spice (0-5)</label>
                        <select id="spice">
                            <option value="">вҖ”</option>
                            <option>0</option>
                            <option>рҹҢ¶пёҸ</option>
                            <option>рҹҢ¶пёҸрҹҢ¶пёҸ</option>
                            <option>рҹҢ¶пёҸрҹҢ¶пёҸрҹҢ¶пёҸ</option>
                            <option>рҹҢ¶пёҸрҹҢ¶пёҸрҹҢ¶пёҸрҹҢ¶пёҸ</option>
                            <option>рҹҢ¶пёҸрҹҢ¶пёҸрҹҢ¶пёҸрҹҢ¶пёҸрҹҢ¶пёҸ</option>
                        </select>
                    </div>
                </div>


                <label for="authors">Authors</label>
                <select id="authors" multiple size="4" style="min-height:64px"></select>


                <div style="margin-top:10px;display:flex;gap:8px">
                    <button type="submit">Search</button>
                    <button type="button" id="clearForm" style="background:#6b7280">Clear</button>
                </div>
            </form>
        </section>

        <div id="msg" style="position:fixed;right:18px;bottom:18px;z-index:999"></div>

    </div>


</div>

</body>
</html>
